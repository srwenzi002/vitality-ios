# ========================================
# Vitality Genesis Application Configuration
# ========================================

spring.application.name=VitalityBackend

# ========================================
# 数据源配置 - PostgreSQL
# ========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5432/vitality_genesis?sslmode=disable}
spring.datasource.username=${DB_USERNAME:vitality_admin}
spring.datasource.password=${DB_PASSWORD:VitalityPass2024!}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# JPA / Hibernate 配置
# ========================================
# 数据库方言
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# DDL策略: validate - 验证模式（生产环境推荐）
# 其他选项: create, create-drop, update, none
spring.jpa.hibernate.ddl-auto=validate

# 显示SQL语句
spring.jpa.show-sql=true

# 格式化SQL语句
spring.jpa.properties.hibernate.format_sql=true

# 使用新的ID生成器
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# 批量操作优化
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ========================================
# 数据库连接池配置 - HikariCP
# ========================================
# 最大连接池大小
spring.datasource.hikari.maximum-pool-size=10

# 最小空闲连接数
spring.datasource.hikari.minimum-idle=5

# 连接超时时间（毫秒）
spring.datasource.hikari.connection-timeout=30000

# 空闲连接最大存活时间（毫秒）
spring.datasource.hikari.idle-timeout=600000

# 连接最大存活时间（毫秒）
spring.datasource.hikari.max-lifetime=1800000

# 连接测试查询
spring.datasource.hikari.connection-test-query=SELECT 1

# 连接池名称
spring.datasource.hikari.pool-name=VitalityHikariCP

# ========================================
# 日志配置
# ========================================
# MyBatis-Plus 枚举统一使用小写字符串
mybatis-plus.configuration.default-enum-type-handler=com.vitality.infrastructure.mybatis.handler.LowercaseEnumTypeHandler

# SQL日志
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# 应用日志
logging.level.com.vitality=DEBUG

# ========================================
# 服务器配置
# ========================================
server.port=8080
server.servlet.context-path=/api

# ========================================
# 时区配置
# ========================================
spring.jackson.time-zone=Asia/Shanghai
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.default-property-inclusion=non_null

# ========================================
# 业务配置 - 运动挖矿
# ========================================
# 卡路里转元气币比例
app.mining.calories-to-coins-ratio=1.0

# 每日打卡目标卡路里
app.mining.daily-goal-calories=300

# 每日最高获得元气币
app.mining.max-daily-coins=300

# ========================================
# 业务配置 - P2P交易
# ========================================
# P2P交易手续费率 (2.5%)
app.trading.p2p-transaction-fee-rate=0.025

# ========================================
# 业务配置 - 盲盒系统
# ========================================
# 盲盒保底次数
app.blindbox.guarantee-count=10

# 卡片稀有度概率配置
app.blindbox.rarity-probabilities.N=0.9
app.blindbox.rarity-probabilities.R=0.08
app.blindbox.rarity-probabilities.SR=0.018
app.blindbox.rarity-probabilities.SSR=0.002
