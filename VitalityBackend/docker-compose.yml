services:
  postgres:
    image: postgres:16-alpine
    container_name: vitality-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vitality_genesis
      POSTGRES_USER: vitality_admin
      POSTGRES_PASSWORD: VitalityPass2024!
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitality_admin -d vitality_genesis"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
